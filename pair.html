<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QueenBella Pair</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  overflow:hidden;
}

/* animated glow background */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:linear-gradient(45deg,#00f0ff,#8a2be2,#ff00c8);
  filter:blur(120px);
  animation:move 10s infinite alternate;
}

@keyframes move{
  from{transform:translate(-200px,-200px)}
  to{transform:translate(200px,200px)}
}

.card{
  position:relative;
  width:340px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  text-align:center;
  transition:0.4s ease;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 0 60px rgba(0,255,255,0.4);
}

.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f0ff,#ff00c8);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:12px;
  opacity:0.7;
  margin-bottom:20px;
}

.input-box{
  display:flex;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}

.input-box input{
  flex:1;
  padding:14px;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  font-size:14px;
}

.input-box button{
  padding:14px;
  border:none;
  background:linear-gradient(135deg,#00f0ff,#8a2be2);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.input-box button:hover{
  background:linear-gradient(135deg,#ff00c8,#00f0ff);
}

.result{
  margin-top:20px;
  font-weight:600;
  cursor:pointer;
}

.wait{
  font-size:13px;
  opacity:0.7;
}

.footer{
  margin-top:15px;
  font-size:11px;
  opacity:0.5;
}

</style></head><body><div class="card">
  <div class="title"><i class="fa fa-bolt"></i> QUEENBELLA</div>
  <div class="subtitle">PAIRING SYSTEM • ROYTECH</div>  <div class="input-box">
    <input type="number" id="number" placeholder="2547XXXXXXXX" />
    <button id="submit"><i class="fa fa-arrow-right"></i></button>
  </div>  <div id="pair" class="result"></div>
  <div id="wait" class="wait" style="display:none">Generating code...</div>  <div class="footer">Enter WhatsApp number with country code</div>
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script><script>
let pair = document.getElementById("pair");
let btn = document.getElementById("submit");
let input = document.getElementById("number");
let wait = document.getElementById("wait");

async function copyCode(){
  let text = pair.innerText.replace('CODE: ','');
  await navigator.clipboard.writeText(text);
  pair.innerText = "✔ COPIED";
  setTimeout(()=>{
    pair.innerText = "CODE: " + text;
  },1000);
}

btn.addEventListener("click", async(e)=>{
  e.preventDefault();

  if(!input.value){
    pair.innerHTML = "⚠ Enter your number";
    return;
  }

  let num = input.value.replace(/[^0-9]/g,'');

  if(num.length < 11){
    pair.innerHTML = "❌ Invalid number";
    return;
  }

  wait.style.display = "block";
  pair.innerHTML = "";

  try{
    let {data} = await axios(`/code?number=${num}`);
    let code = data.code || "Unavailable";

    wait.style.display = "none";
    pair.innerHTML = "CODE: " + code;
    pair.onclick = copyCode;

  }catch{
    wait.style.display = "none";
    pair.innerHTML = "⚠ Server error";
  }
});
</script></body>
</html>
