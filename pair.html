<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEXUS PAIR | Quantum Code Engine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* animated tech grid background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* glowing orb effect */
    body::after {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80vmax;
      height: 80vmax;
      background: radial-gradient(circle, rgba(0, 180, 255, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 1.5rem;
    }

    /* main tech card */
    .tech-card {
      background: rgba(8, 12, 25, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1) inset, 0 0 20px rgba(0, 210, 255, 0.3);
      transition: all 0.3s ease;
      overflow: hidden;
      position: relative;
    }

    .tech-card:hover {
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.4) inset, 0 0 30px rgba(0, 210, 255, 0.4);
    }

    /* animated gradient scanline */
    .tech-card::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(0, 255, 255, 0.1), transparent 30%);
      animation: rotateGlow 12s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card-content {
      position: relative;
      z-index: 2;
      padding: 2rem 2rem 2.2rem;
    }

    /* header section */
    .tech-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .icon-ring {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0e1a2a, #02060c);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 1px solid cyan;
      box-shadow: 0 0 12px cyan, inset 0 0 6px rgba(0, 255, 255, 0.5);
      margin-bottom: 1rem;
    }

    .icon-ring i {
      font-size: 2.4rem;
      color: #0ff;
      text-shadow: 0 0 8px cyan;
    }

    .tech-header h3 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff, #3cc7ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .badge {
      display: inline-block;
      background: rgba(0, 255, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #8df;
      border: 0.5px solid rgba(0, 255, 255, 0.4);
      letter-spacing: 1px;
    }

    .sub-text {
      color: #a0b3d9;
      font-size: 0.85rem;
      margin-top: 0.8rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .sub-text i {
      font-size: 0.7rem;
      color: #0ff;
    }

    /* input area - high tech */
    .input-fusion {
      margin: 1.8rem 0 1.2rem;
    }

    .glow-label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7f9fcf;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .tech-input-group {
      display: flex;
      background: rgba(0, 5, 15, 0.7);
      border-radius: 60px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .tech-input-group:focus-within {
      border-color: #0ff;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
    }

    .tech-input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: #eef5ff;
      outline: none;
      font-family: 'JetBrains Mono', monospace, 'Inter';
      letter-spacing: 0.3px;
    }

    .tech-input-group input::placeholder {
      color: #4a6085;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
    }

    .tech-input-group input:focus {
      color: white;
    }

    .tech-input-group button {
      background: linear-gradient(95deg, #0a1a2f, #001c2f);
      border: none;
      border-left: 1px solid rgba(0, 255, 255, 0.4);
      padding: 0 2rem;
      border-radius: 60px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #0ff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tech-input-group button i {
      font-size: 0.9rem;
    }

    .tech-input-group button:hover {
      background: linear-gradient(95deg, #0f2a48, #00263b);
      color: white;
      text-shadow: 0 0 4px cyan;
      border-left-color: cyan;
      box-shadow: -2px 0 10px rgba(0, 255, 255, 0.3);
    }

    /* response panel */
    .response-panel {
      margin-top: 1.8rem;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(0, 255, 255, 0.2);
      transition: all 0.2s;
      min-height: 95px;
    }

    .code-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .code-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(145deg, #b9f2ff, #0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .copy-btn {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.5);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      font-weight: bold;
      color: #0ff;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .copy-btn:hover {
      background: rgba(0, 255, 255, 0.25);
      color: white;
      box-shadow: 0 0 6px cyan;
    }

    .waiting-message {
      text-align: center;
      font-size: 0.85rem;
      color: #9ad7ff;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-text {
      font-size: 0.9rem;
      color: #bfd9ff;
    }

    .error-text {
      color: #ff4d6d;
      text-shadow: 0 0 3px rgba(255, 0, 60, 0.4);
    }

    /* footer signature */
    .cyber-footer {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #3c5680;
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }

    .cyber-footer i {
      color: cyan;
      font-size: 0.6rem;
    }

    /* loading animation */
    .loader-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loader-dots span {
      width: 6px;
      height: 6px;
      background: #0ff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8);}
      50% { opacity: 1; transform: scale(1.2);}
    }

    /* responsive */
    @media (max-width: 550px) {
      .card-content {
        padding: 1.5rem;
      }
      .tech-input-group {
        flex-direction: column;
        border-radius: 2rem;
        background: rgba(0, 5, 15, 0.8);
      }
      .tech-input-group input {
        border-radius: 2rem;
        text-align: center;
        padding: 0.9rem;
      }
      .tech-input-group button {
        border-left: none;
        border-top: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 2rem;
        justify-content: center;
        padding: 0.8rem;
        margin: 0.2rem;
      }
      .tech-header h3 {
        font-size: 1.4rem;
      }
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="tech-card">
    <div class="card-content">
      <div class="tech-header">
        <div class="icon-ring">
          <i class="fas fa-microchip"></i>
        </div>
        <h3>NEXUS::PAIR</h3>
        <div class="badge">
          <i class="fas fa-bolt"></i> QUANTUM ENGINE v2.0
        </div>
        <div class="sub-text">
          <i class="fas fa-shield-alt"></i> SECURE PEER PROTOCOL
          <i class="fas fa-code-branch"></i>
        </div>
      </div>

      <div class="input-fusion">
        <span class="glow-label"><i class="fas fa-phone-alt"></i> ▸ DEVICE REGISTRY</span>
        <div class="tech-input-group">
          <input type="tel" id="number" placeholder="+254 755 6600XXX" value="">
          <button id="submit"><i class="fas fa-satellite-dish"></i> PAIR</button>
        </div>
        <div class="sub-text" style="justify-content: flex-start; font-size: 0.7rem; margin-top: 8px;">
          <i class="fas fa-globe"></i> include country code · end-to-end encrypted
        </div>
      </div>

      <!-- dynamic response area -->
      <div class="response-panel" id="responsePanel">
        <div id="pairOutput" style="transition: all 0.2s;">
          <div class="waiting-message" style="opacity: 0.6;">
            <i class="fas fa-waveform"></i> <span>awaiting handshake</span>
          </div>
        </div>
      </div>

      <div class="cyber-footer">
        <span><i class="fas fa-skull-crosswalk"></i> ROYTECH//CYBER</span>
        <span><i class="fas fa-qrcode"></i> PAIR CODE PROTOCOL</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
  (function() {
    const outputContainer = document.getElementById("pairOutput");
    const submitBtn = document.getElementById("submit");
    const phoneInput = document.getElementById("number");
    
    // Helper: format number display with spaces
    function formatPhoneDisplay(rawNumber) {
      let digits = rawNumber.replace(/[^0-9]/g, "");
      if (!digits) return "";
      let formatted = "";
      for (let i = 0; i < digits.length; i++) {
        if (i === 3 || i === 6) formatted += " ";
        formatted += digits[i];
      }
      return "+" + formatted;
    }

    // Show loading state
    function setLoading(isLoading, customMessage = null) {
      if (isLoading) {
        outputContainer.innerHTML = `
          <div class="waiting-message">
            <i class="fas fa-spinner fa-pulse"></i> 
            <span>${customMessage || "processing handshake..."}</span>
            <div class="loader-dots"><span></span><span></span><span></span></div>
          </div>
        `;
      }
    }

    function showError(message) {
      outputContainer.innerHTML = `
        <div class="waiting-message error-text">
          <i class="fas fa-exclamation-triangle"></i> 
          <span>${message}</span>
        </div>
      `;
    }

    function showCodeResponse(code) {
      // code can be string or fallback
      const displayCode = (code && code !== "Service Unavailable") ? code : "// UNAVAILABLE";
      outputContainer.innerHTML = `
        <div class="code-display">
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-size: 0.7rem; letter-spacing: 1px; color: #7fa5d0;"><i class="fas fa-key"></i> AUTHENTICATION TOKEN</span>
            <span class="code-value" id="codeValueSpan">${displayCode}</span>
          </div>
          <button class="copy-btn" id="dynamicCopyBtn">
            <i class="fas fa-copy"></i> DUPLICATE
          </button>
        </div>
      `;
      // attach copy event for new button
      const copyBtn = document.getElementById("dynamicCopyBtn");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => {
          const codeSpan = document.getElementById("codeValueSpan");
          if (codeSpan) {
            const rawCode = codeSpan.innerText;
            navigator.clipboard.writeText(rawCode).then(() => {
              const originalHTML = copyBtn.innerHTML;
              copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIED';
              copyBtn.style.background = "rgba(0,255,200,0.3)";
              setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.style.background = "";
              }, 800);
            }).catch(() => {
              showError("clipboard error");
            });
          }
        });
      }
    }

    function showWaitingMessage() {
      outputContainer.innerHTML = `
        <div class="waiting-message">
          <i class="fas fa-hourglass-half"></i> 
          <span>please wait, pairing in progress...</span>
        </div>
      `;
    }

    // core submit handler
    async function handlePairing(e) {
      e.preventDefault();
      
      let rawValue = phoneInput.value.trim();
      if (!rawValue) {
        showError("⟁ INPUT REQUIRED: enter WhatsApp number with country code");
        return;
      }
      
      // extract digits only for validation & API
      const digitsOnly = rawValue.replace(/[^0-9]/g, "");
      if (digitsOnly.length < 10 || digitsOnly.length > 15) {
        showError("⚠ INVALID FORMAT · number must contain 10-15 digits (country code + number)");
        return;
      }
      
      // update input field with formatted version for visual
      const formattedForDisplay = formatPhoneDisplay(digitsOnly);
      if (formattedForDisplay) {
        phoneInput.value = formattedForDisplay;
      }
      
      // Show loading / waiting animation
      showWaitingMessage();
      
      try {
        // API call to /code endpoint (relative, uses current origin)
        const response = await axios.get(`/code?number=${digitsOnly}`, {
          timeout: 15000,
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        
        let codeData = response.data;
        let pairingCode = codeData.code || "Service Unavailable";
        
        if (pairingCode === "Service Unavailable" || !pairingCode) {
          showError("⌛ PAIRING SERVER OFFLINE · try again later");
        } else {
          showCodeResponse(pairingCode);
        }
      } catch (error) {
        console.error("Pairing error:", error);
        let errorMsg = "⚡ CONNECTION FAILED · check network / backend service";
        if (error.response && error.response.status === 404) {
          errorMsg = "🔌 endpoint not found · verify backend route /code";
        } else if (error.code === "ECONNABORTED") {
          errorMsg = "⏱ TIMEOUT · server unresponsive";
        }
        showError(errorMsg);
      }
    }
    
    // realtime formatting for input (non-intrusive)
    function handleInputFormatting(e) {
      let val = phoneInput.value.replace(/[^0-9+]/g, "");
      if (val.startsWith("+")) val = val.substring(1);
      let digits = val.replace(/[^0-9]/g, "");
      if (digits.length > 0) {
        let formatted = "";
        for (let i = 0; i < digits.length; i++) {
          if (i === 3 || i === 6) formatted += " ";
          formatted += digits[i];
        }
        phoneInput.value = "+" + formatted;
      } else {
        phoneInput.value = "";
      }
    }
    
    // attach event listeners
    submitBtn.addEventListener("click", handlePairing);
    phoneInput.addEventListener("input", handleInputFormatting);
    phoneInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handlePairing(e);
      }
    });
    
    // initial placeholder / sample style
    phoneInput.placeholder = "254 755 660 123";
    
    // Additional if the waiting-message link is shown from old design, we override the default display.
    // Also keep compatibility: we removed old 'waiting-message' anchor but created new modern flow.
    // cleanup old references if any.
  })();
</script>
</body>
</html>
